<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Apply Bind</title>
  </head>
  <body>
    <h1>Call, Apply, Bind</h1>
    <script>
      const student = {
        name: "Akshay",
        marks: 80,
        printName: function () {
          console.log(this.name);
        },
        printMarks: () => {
          console.log(this.marks);
        },
      };

      student.printName();
      // this gives undefined as lexical context
      // of arrow function(printMarks) is global space where
      // marks property does not exist
      student.printMarks();

      const student2 = {
        name: "Dev",
        marks: 23,
      };

      //call apply bind is basically function/method borrowing

      // Below is example of method(function inside an object) borrowing
      // here we are invoking printName method inside
      // student object and passing value of this reference
      // inside method as student2
      student.printName.call(student2);

      // Below is example of function borrowing
      function printHealthStatus(patientName, patientAge) {
        console.log(
          `${patientName} is ${patientAge} years old and his health status is ${this.healthStatus}`
        );
      }

      const patient1 = {
        healthStatus: "Healthy",
      };
      const patient2 = {
        healthStatus: "Poor",
      };

      // now instead of method we will directly
      // borrow a function remember not
      // arrow function
      // first argument of call is value of this
      // keyword, then other arguments
      // are value of borrowed function parameters
      printHealthStatus.call(patient1, "Devrath", 23);
      printHealthStatus.call(patient2, "Akash", 23);

      // in apply the parameters of borrowed function
      // is passed as array of argument in apply method
      printHealthStatus.apply(patient1, ["Mani", 23]);
      printHealthStatus.apply(patient2, ["Kani", 23]);

      // CALL and APPLY invoked immediately
      // BIND makes a copy of borrowed
      // function - NOT invoked immediately

      const printactualHealthStatus = printHealthStatus.bind(
        patient1,
        "Kaju",
        45
      );
      const printactualHealthStatus2 = printHealthStatus.bind(
        patient2,
        "Raju",
        45
      );
      printactualHealthStatus();
      printactualHealthStatus2();

      // Below is example of arrow function borrowing
      const printSomething = () => {
        console.log(this.healthStatus);
      };
      // this prints undefined
      // as in arrow function
      // this directly takes
      // reference to it's
      // lexical environment
      // which is global
      // where healthStatus
      // property does not exist
      printSomething.call(patient1);
    </script>
  </body>
</html>
